info:
  name: Update exam item
  type: http
  seq: 6

http:
  method: PATCH
  url: "{{appUrl}}/api/items/{{examItemId}}"
  body:
    type: json
    data: |-
      {
        "difficulty": 4,
        "content": {
          "type": "multiple-choice",
          "question": "Who wrote 'The Prince' in 1532?",
          "options": [
            "Zach Olivare",
            "Niccolò Machiavelli",
            "Napoleon Bonaparte",
            "Leonardo da Vinci",
            "Galileo Galilei"
          ],
          "correctAnswer": "Zach Olivare",
          "explanation": "😈"
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
